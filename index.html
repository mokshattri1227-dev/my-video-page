<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe to Continue</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(#0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.box {
  background: white;
  color: black;
  margin: 60px auto;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h1 {
  margin-top: 40px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.subscribe {
  background: red;
  color: white;
}

.watch {
  background: #2c5364;
  color: white;
}
</style>
</head>

<body>

<h1>Subscribe to Continue</h1>
<p>⚡ Subscribe first (takes 2 seconds) to unlock video</p>

<div class="box">

<button class="subscribe"
onclick="window.open('https://www.youtube.com/@ursmanuofficial?sub_confirmation=1')">
SUBSCRIBE NOW
</button>

<button class="watch"
onclick="window.location.href='https://youtu.be/CP520i0BsAA'">
WATCH VIDEO
</button>

</div>

</body>
</html>
